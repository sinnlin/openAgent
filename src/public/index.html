<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openAgent - 智能助手</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h2>openAgent</h2>
            </div>
            
            <div class="agent-info">
                <div class="info-card">
                    <div class="info-label">状态</div>
                    <div class="info-value" id="status">🟢 在线</div>
                </div>
                <div class="info-card">
                    <div class="info-label">工具数量</div>
                    <div class="info-value" id="toolCount">0</div>
                </div>
                <div class="info-card">
                    <div class="info-label">模型</div>
                    <div class="info-value" id="modelName">加载中...</div>
                </div>
            </div>
            
            <div class="tools-list">
                <h3>🔧 可用工具</h3>
                <div id="tools" class="tools-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button class="btn-clear" id="clearBtn">
                    🗑️ 清除记忆
                </button>
                <div class="version">v1.0.0</div>
            </div>
        </aside>
        
        <!-- 主聊天区域 -->
        <main class="chat-area">
            <div class="chat-header">
                <h1>💬 openAgent 对话</h1>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    连接中...
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">👋</div>
                    <h3>欢迎使用 openAgent</h3>
                    <p>我可以帮你：</p>
                    <ul>
                        <li>📐 执行数学计算</li>
                        <li>📝 处理文本内容</li>
                        <li>⏰ 获取时间信息</li>
                        <li>🔧 使用各种工具完成任务</li>
                    </ul>
                    <p>试试向我提问吧！</p>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="输入你的问题... (按 Enter 发送，Shift+Enter 换行)"
                        rows="3"
                    ></textarea>
                    <div class="input-actions">
                        <button id="sendBtn" class="btn-send">
                            <span>发送</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-hint">
                    <span>💡 提示: 支持数学计算、文本处理、时间查询等功能</span>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 加载 Socket.IO 客户端 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
